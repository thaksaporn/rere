function clearRealBuildings(){
while(buildingGroup.children.length){
let child = buildingGroup.children.pop()
buildingGroup.remove(child)
if(child.geometry) child.geometry.dispose()
if(child.material){
if(Array.isArray(child.material)){
child.material.forEach(material => material.dispose())
}else{
child.material.dispose()
}
}
}
}

function clearBuildingOverlay(){
footprintContext.clearRect(0, 0, footprintCanvas.width, footprintCanvas.height)
footprintTexture.needsUpdate = true
}

function projectedToCanvas(point){
return {
x: (point.x / 600 + 0.5) * footprintCanvas.width,
y: (-point.z / 600 + 0.5) * footprintCanvas.height
}
}

function drawBuildingOverlay(projected){
if(projected.length < 3) return

footprintContext.beginPath()
let start = projectedToCanvas(projected[0])
footprintContext.moveTo(start.x, start.y)
for(let i = 1; i < projected.length; i++){
let p = projectedToCanvas(projected[i])
footprintContext.lineTo(p.x, p.y)
}
footprintContext.closePath()
footprintContext.fillStyle = "rgba(215, 208, 198, 0.82)"
footprintContext.fill()
footprintContext.strokeStyle = "rgba(150, 142, 130, 0.95)"
footprintContext.lineWidth = 3
footprintContext.stroke()
footprintTexture.needsUpdate = true
}

function projectLatLonToMap(lat, lon){
let xTile = lonToTileX(lon, currentMapProjection.zoom)
let yTile = latToTileY(lat, currentMapProjection.zoom)
let tileDeltaX = xTile - currentMapProjection.centerTileX
let tileDeltaY = yTile - currentMapProjection.centerTileY
let unitsPerTile = currentMapProjection.worldSize / 2

return {
x: tileDeltaX * unitsPerTile,
z: -tileDeltaY * unitsPerTile
}
}

function parseBuildingHeight(tags){
let rawHeight = tags["height"] || tags["building:height"]
if(rawHeight){
let value = parseFloat(String(rawHeight).replace(/[^\d.]/g, ""))
if(Number.isFinite(value) && value > 0) return value
}

let levels = parseFloat(tags["building:levels"] || tags["levels"] || "")
if(Number.isFinite(levels) && levels > 0) return levels * 3.4

return 12
}

function addRealBuilding(geometryPoints, tags){
if(!geometryPoints || geometryPoints.length < 3) return

let projected = geometryPoints.map(point => projectLatLonToMap(point.lat, point.lon))
drawBuildingOverlay(projected)
let shape = new THREE.Shape()
shape.moveTo(projected[0].x, projected[0].z)
for(let i = 1; i < projected.length; i++){
shape.lineTo(projected[i].x, projected[i].z)
}

let height = parseBuildingHeight(tags) * 1.6
let extrude = new THREE.ExtrudeGeometry(shape, {
depth: height,
bevelEnabled: false
})
extrude.rotateX(-Math.PI / 2)

let color = tags["building"] === "commercial" ? 0xcbbca9 : 0xd7d0c6
let material = new THREE.MeshStandardMaterial({
color,
roughness: 0.95,
metalness: 0.03
})

let mesh = new THREE.Mesh(extrude, material)
mesh.castShadow = true
mesh.receiveShadow = true
mesh.position.y = 0
buildingGroup.add(mesh)
}

async function updateRealBuildings(lat, lon){
let fetchKey = `${lat.toFixed(4)},${lon.toFixed(4)}`
if(fetchKey === lastBuildingFetchKey || fetchKey === pendingBuildingFetchKey) return

let requestToken = ++latestBuildingRequestToken
pendingBuildingFetchKey = fetchKey

let radius = 170
let query = `
[out:json][timeout:20];
(
  way["building"](around:${radius},${lat},${lon});
  relation["building"](around:${radius},${lat},${lon});
);
out geom;
`

try{
let response = await fetch("https://overpass-api.de/api/interpreter", {
method: "POST",
headers: { "Content-Type": "text/plain;charset=UTF-8" },
body: query
})

if(!response.ok) throw new Error("building fetch failed")
let data = await response.json()
if(requestToken !== latestBuildingRequestToken) return

clearRealBuildings()
clearBuildingOverlay()
for(const element of data.elements || []){
if(element.type !== "way" || !element.geometry || !element.tags) continue
addRealBuilding(element.geometry, element.tags)
}
lastBuildingFetchKey = fetchKey
pendingBuildingFetchKey = ""
}catch(error){
if(requestToken !== latestBuildingRequestToken) return
pendingBuildingFetchKey = ""
console.warn("Unable to load real buildings", error)
}
}

}

function lonToTileX(lon, zoom){
return ((lon + 180) / 360) * Math.pow(2, zoom)
}

function latToTileY(lat, zoom){
let latRad = lat * Math.PI / 180
return (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * Math.pow(2, zoom)
}

function loadImage(url){
return new Promise((resolve, reject) => {
let image = new Image()
image.crossOrigin = "anonymous"
image.onload = () => resolve(image)
image.onerror = reject
image.src = url
})
}

async function updateGroundMap(lat, lon){
let clampedLat = Math.max(-85, Math.min(85, lat))
let zoom = 16
let tileSize = 256
let requestToken = ++latestMapRequestToken

drawMapPlaceholder(clampedLat, lon, "Loading map tiles...")

let xFloat = lonToTileX(lon, zoom)
let yFloat = latToTileY(clampedLat, zoom)
currentMapProjection.centerLat = clampedLat
currentMapProjection.centerLon = lon
currentMapProjection.centerTileX = xFloat
currentMapProjection.centerTileY = yFloat
currentMapProjection.worldSize = 600
currentMapProjection.zoom = zoom
let centerTileX = Math.floor(xFloat)
let centerTileY = Math.floor(yFloat)
let fracX = xFloat - centerTileX
let fracY = yFloat - centerTileY
let worldSize = Math.pow(2, zoom)

let jobs = []
for(let dy = -1; dy <= 1; dy++){
for(let dx = -1; dx <= 1; dx++){
let xTile = ((centerTileX + dx) % worldSize + worldSize) % worldSize
let yTile = Math.max(0, Math.min(worldSize - 1, centerTileY + dy))
let url = `https://tile.openstreetmap.org/${zoom}/${xTile}/${yTile}.png`
jobs.push(loadImage(url).then(image => ({ image, dx, dy })))
}
}

try{
let tiles = await Promise.all(jobs)
if(requestToken !== latestMapRequestToken) return

let bufferCanvas = document.createElement("canvas")
bufferCanvas.width = tileSize * 3
bufferCanvas.height = tileSize * 3
let bufferContext = bufferCanvas.getContext("2d")

for(const tile of tiles){
let drawX = (tile.dx + 1) * tileSize
let drawY = (tile.dy + 1) * tileSize
bufferContext.drawImage(tile.image, drawX, drawY, tileSize, tileSize)
}

mapContext.clearRect(0, 0, mapCanvas.width, mapCanvas.height)

let sourceSize = tileSize * 2
let sourceX = fracX * tileSize
let sourceY = fracY * tileSize

mapContext.drawImage(
bufferCanvas,
sourceX,
sourceY,
sourceSize,
sourceSize,
0,
0,
mapCanvas.width,
mapCanvas.height
)

mapContext.strokeStyle = "rgba(255,255,255,0.9)"
mapContext.lineWidth = 4
mapContext.strokeRect(8, 8, mapCanvas.width - 16, mapCanvas.height - 16)

mapContext.fillStyle = "rgba(20, 30, 45, 0.72)"
mapContext.fillRect(18, 18, 350, 76)

mapContext.fillStyle = "#ffffff"
mapContext.font = "bold 28px Arial"
mapContext.textAlign = "left"
mapContext.fillText(`Lat ${clampedLat.toFixed(5)}`, 32, 52)
mapContext.fillText(`Lon ${lon.toFixed(5)}`, 32, 88)

mapContext.strokeStyle = "#d62828"
mapContext.lineWidth = 5
mapContext.beginPath()
mapContext.moveTo(mapCanvas.width / 2 - 20, mapCanvas.height / 2)
mapContext.lineTo(mapCanvas.width / 2 + 20, mapCanvas.height / 2)
mapContext.moveTo(mapCanvas.width / 2, mapCanvas.height / 2 - 20)
mapContext.lineTo(mapCanvas.width / 2, mapCanvas.height / 2 + 20)
mapContext.stroke()

mapTexture.needsUpdate = true
}catch(error){
if(requestToken !== latestMapRequestToken) return
drawMapPlaceholder(clampedLat, lon, "Map tiles unavailable")
}
}


// ---------- SOLAR POSITION ----------

function solarPosition(date,lat,lon){
let rad=Math.PI/180
let start=new Date(date.getFullYear(),0,0)
let diff=date-start
let d=Math.floor(diff/86400000)

let B=(360/365)*(d-81)
let EoT= 9.87*Math.sin(2*B*rad) - 7.53*Math.cos(B*rad) - 1.5*Math.sin(B*rad)
let delta= -23.45*Math.cos((360/365)*(d+10)*rad)

let tz=Math.round(lon/15)
let LSTM=15*tz
let TC=4*(lon-LSTM)+EoT
let LT=date.getHours()+date.getMinutes()/60
let LST=LT+TC/60
let HRA=15*(LST-12)

let sin_alt= Math.sin(delta*rad)*Math.sin(lat*rad) + Math.cos(delta*rad)*Math.cos(lat*rad)*Math.cos(HRA*rad)
let altitude=Math.asin(sin_alt)/rad

let cos_az= (Math.sin(delta*rad)*Math.cos(lat*rad) - Math.cos(delta*rad)*Math.sin(lat*rad)*Math.cos(HRA*rad)) / Math.cos(altitude*rad)
cos_az=Math.max(-1,Math.min(1,cos_az))

let azimuth=Math.acos(cos_az)/rad
if(HRA>0) azimuth=360-azimuth

return{ d, B, EoT, delta, tz, LSTM, TC, LT, LST, HRA, altitude, azimuth }
}


// ---------- SUNRISE SUNSET (IMPROVED) ----------

function sunTimes(date, lat, lon){
let rad = Math.PI/180;
let start = new Date(date.getFullYear(), 0, 0);
let diff = date - start;
let d = Math.floor(diff / 86400000);

let B = (360/365)*(d-81);
let EoT = 9.87*Math.sin(2*B*rad) - 7.53*Math.cos(B*rad) - 1.5*Math.sin(B*rad);
let delta = -23.45*Math.cos((360/365)*(d+10)*rad);

let tz = Math.round(lon/15);
let LSTM = 15*tz;
let TC = 4*(lon-LSTM) + EoT;

let cos_HRA = -Math.tan(lat*rad) * Math.tan(delta*rad);
if(cos_HRA > 1) return { sunrise: "-", sunset: "-" }; 
if(cos_HRA < -1) return { sunrise: "24h Sun", sunset: "24h Sun" }; 

let HRA_hours = (Math.acos(cos_HRA) / rad) / 15;
let LT_sunrise = 12 - HRA_hours - (TC/60);
let LT_sunset = 12 + HRA_hours - (TC/60);

function formatTime(decimalHours) {
    if (isNaN(decimalHours)) return "--:--";
    let h = Math.floor(decimalHours);
    let m = Math.round((decimalHours - h) * 60);
    if (m === 60) { h += 1; m = 0; }
    if (h < 0) h += 24;
    if (h >= 24) h -= 24;
    return h.toString().padStart(2, "0") + ":" + m.toString().padStart(2, "0");
}

return {
    sunrise: formatTime(LT_sunrise),
    sunset: formatTime(LT_sunset)
};
}


// ---------- UPDATE SUN ----------

function updateSunVector(){
if(sunVector) scene.remove(sunVector)
let points=[ new THREE.Vector3(0,0,0), sun.position ]
let geometry=new THREE.BufferGeometry().setFromPoints(points)
sunVector=new THREE.Line(
geometry, new THREE.LineBasicMaterial({color:0x00aaff, opacity: 0.5, transparent: true})
)
scene.add(sunVector)
}

function drawSolarPath(){
if(solarPathLine) scene.remove(solarPathLine)

let lat=parseFloat(document.getElementById("latInput").value)
let lon=parseFloat(document.getElementById("lonInput").value)
let dateInput=document.getElementById("date").value
let baseDate=new Date(dateInput)
let points=[]

for(let h=0;h<=24;h+=0.25){
let d=new Date(baseDate)
d.setHours(Math.floor(h))
d.setMinutes((h%1)*60)
let pos=solarPosition(d,lat,lon)

if(pos.altitude>0){
let alt=pos.altitude*Math.PI/180
let az=pos.azimuth*Math.PI/180
let r=solarRadius
let x=r*Math.cos(alt)*Math.sin(az)
let y=r*Math.sin(alt)
let z=-r*Math.cos(alt)*Math.cos(az) 
points.push(new THREE.Vector3(x,y,z))
}
}

let geometry=new THREE.BufferGeometry().setFromPoints(points)
solarPathLine=new THREE.Line(
geometry, new THREE.LineBasicMaterial({color:0xff0000})
)
scene.add(solarPathLine)
}

function updateDynamicLighting(pos) {
    if(pos.altitude > 10) { 
        skyMat.color.setHex(0x87ceeb);
        sunLight.intensity = 1.5;
        ambientLight.intensity = 0.5;
    } 
    else if(pos.altitude > 0) { 
        let transition = pos.altitude / 10; 
        skyMat.color.lerpColors(new THREE.Color(0xff9966), new THREE.Color(0x87ceeb), transition);
        sunLight.intensity = 1.5 * transition; 
        ambientLight.intensity = 0.2 + (0.3 * transition);
    } 
    else { 
        skyMat.color.setHex(0x0a1a2a);
        sunLight.intensity = 0; 
        ambientLight.intensity = 0.1; 
    }
}

function updateSun(){
let lat = parseFloat(document.getElementById("latInput").value)
let lon = parseFloat(document.getElementById("lonInput").value)
let dateInput=document.getElementById("date").value
let minutes=parseInt(document.getElementById("timeSlider").value)

let h=Math.floor(minutes/60)
let m=minutes%60

let date=new Date(dateInput)
date.setHours(h)
date.setMinutes(m)

let pos=solarPosition(date,lat,lon)

let alt=pos.altitude*Math.PI/180
let az=pos.azimuth*Math.PI/180
let r=solarRadius

let x=r*Math.cos(alt)*Math.sin(az)
let y=r*Math.sin(alt)
let z=-r*Math.cos(alt)*Math.cos(az) 

sun.position.set(x,y,z)
sunLight.position.copy(sun.position)

updateDynamicLighting(pos);
updateSunVector()

let timeText = h.toString().padStart(2,"0")+":"+m.toString().padStart(2,"0")
let st = sunTimes(date, lat, lon)

document.getElementById("info").innerHTML = `
<b>Local Time (LT):</b> ${timeText}<br>
<b>Altitude:</b> ${pos.altitude.toFixed(2)}°<br>
<b>Azimuth:</b> ${pos.azimuth.toFixed(2)}°<br>
<b>Sunrise:</b> ${st.sunrise}<br>
<b>Sunset:</b> ${st.sunset}<br>
<hr style="border:0; border-top:1px solid #445566; margin: 8px 0;">
<b>Parameters:</b><br>
<span style="color:#a8c0d8;">
<b>Day of Year (d):</b> ${pos.d}<br>
<b>Time Zone Est. (tz):</b> ${pos.tz}<br>
<b>LSTM:</b> ${pos.LSTM.toFixed(2)}°<br>
<b>Eq. of Time (EoT):</b> ${pos.EoT.toFixed(2)} min<br>
<b>Time Corr (TC):</b> ${pos.TC.toFixed(2)} min<br>
<b>Local Solar Time (LST):</b> ${pos.LST.toFixed(2)} h<br>
<b>Declination (δ):</b> ${pos.delta.toFixed(2)}°<br>
<b>Hour Angle (HRA):</b> ${pos.HRA.toFixed(2)}°
</span>
`
drawSolarPath()
}


// ---------- PLAY SUN ----------

let playing=false
let interval

function playSun(){
playing=!playing
if(playing){

videoBoard.visible = showDecor
if(showDecor) video.play().catch(()=>{})

}else{

video.pause()
videoBoard.visible = false

}

imgShake.visible = showDecor && playing
imgRotate.visible = showDecor && playing
imgLook.visible = showDecor && playing
imgFloat.visible = showDecor && playing
videoBoard.visible = showDecor && playing
let slider=document.getElementById("timeSlider")
let tInput=document.getElementById("timeInput")

if(playing){
interval=setInterval(()=>{
let val = parseInt(slider.value)+1
if(val>1440) val=0
slider.value = val

let h = Math.floor(val/60).toString().padStart(2,"0")
let m = (val%60).toString().padStart(2,"0")
tInput.value = `${h}:${m}`
updateSun()
},40)
}else{
clearInterval(interval)
}
}


// ---------- UI ----------

let timeSlider=document.getElementById("timeSlider")
let timeInput=document.getElementById("timeInput")

timeSlider.oninput=()=>{
let h = Math.floor(timeSlider.value/60).toString().padStart(2,"0")
let m = (timeSlider.value%60).toString().padStart(2,"0")
timeInput.value = `${h}:${m}`
updateSun()
}

timeInput.oninput=()=>{
let parts = timeInput.value.split(":")
if(parts.length === 2){
let mins = parseInt(parts[0])*60 + parseInt(parts[1])
timeSlider.value = mins
updateSun()
}
}

let latInput=document.getElementById("latInput")
let latSlider=document.getElementById("latSlider")

let lonInput=document.getElementById("lonInput")
let lonSlider=document.getElementById("lonSlider")

latSlider.oninput=()=>{
latInput.value=latSlider.value
updateLocationVisuals(parseFloat(latSlider.value), parseFloat(lonInput.value))
updateSun()
}
latInput.oninput=()=>{
latSlider.value=latInput.value
updateLocationVisuals(parseFloat(latInput.value), parseFloat(lonInput.value))
updateSun()
}
lonSlider.oninput=()=>{
lonInput.value=lonSlider.value
updateLocationVisuals(parseFloat(latInput.value), parseFloat(lonSlider.value))
updateSun()
}
lonInput.oninput=()=>{
lonSlider.value=lonInput.value
updateLocationVisuals(parseFloat(latInput.value), parseFloat(lonInput.value))
updateSun()
}

document.getElementById("date").oninput=updateSun

document.getElementById("locationSelect").onchange=function(){
let loc=this.value
if(loc && locations[loc]){
let lat=locations[loc].lat
let lon=locations[loc].lon
latInput.value=lat
latSlider.value=lat
lonInput.value=lon
lonSlider.value=lon
updateLocationVisuals(lat, lon)
updateSun()
}
}

function setCoordinates(lat, lon){
latInput.value = lat
latSlider.value = lat
lonInput.value = lon
lonSlider.value = lon
document.getElementById("locationSelect").value = ""
updateLocationVisuals(lat, lon)
updateSun()
}

function useCurrentLocation(){
if(!navigator.geolocation){
document.getElementById("info").innerHTML = "<b>GPS:</b> Browser does not support geolocation.<br><br>" + document.getElementById("info").innerHTML
return
}

navigator.geolocation.getCurrentPosition(
position => {
setCoordinates(position.coords.latitude, position.coords.longitude)
},
error => {
const messages = {
1: "Location permission denied",
2: "Location unavailable",
3: "Location request timed out"
}
const label = messages[error.code] || "Unable to read GPS location"
document.getElementById("info").innerHTML = `<b>GPS:</b> ${label}<br><br>` + document.getElementById("info").innerHTML
},
{
enableHighAccuracy: true,
timeout: 10000,
maximumAge: 0
}
)
}

document.getElementById("date").valueAsDate=new Date()
drawMapPlaceholder(14.88, 102.01, "Initializing map...")
updateLocationVisuals(parseFloat(latInput.value), parseFloat(lonInput.value))
updateSun()


// ---------- LOOP ----------
let t = 0

function animate(){

requestAnimationFrame(animate)

t += 0.05

if(playing && showDecor){

imgShake.position.x = 90 + Math.sin(t*20)*0.5

imgRotate.rotation.y += 0.05

imgLook.rotation.y = Math.sin(t)*0.8

let r = 95

imgFloat.position.x = Math.cos(t)*r
imgFloat.position.z = Math.sin(t)*r
imgFloat.position.y = 20 + Math.sin(t*2)*3
imgFloat.lookAt(0,20,0)
board.position.y = 60 + Math.sin(t)*1

}

renderer.render(scene,camera)

}
animate()

window.addEventListener("resize",()=>{
camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)
backgroundMap.invalidateSize()
})

</script>
